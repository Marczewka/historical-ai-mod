 regent:0 "Regent"
 regent_desc:0 "This character wields power on behalf of the crown."

 # Buttons 
 vtm_je_first_carlist_war_secure_countryside:0 "@pacify_icon! Secure the Countryside"
 vtm_je_first_carlist_war_secure_countryside_desc:0 "Many would be warlords, bandit kings and Carlist loyalists have been spreading terror with frequent raids deep in the countryside of Old Castille. Flushing these rats out will alleviate the burden on our troops and allow us to take the fight to the pretender!\n$TOOLTIP_DELIMITER$\n@vtm_toggle_icon! This action can be toggled and will automatically repeat as long as its conditions are met and its #I (Selected)#!."
 vtm_je_first_carlist_war_royal_expedition:0 "Begin Royal Expedition"
 vtm_je_first_carlist_war_royal_expedition_desc:0 "The situation of our disassembled forces simply isnt tenable as with every passing day the Isabellinos grow stronger. The King must rally his forces and choose wisely when to strike the enemy and reclaim the capital.\n#b But he must strike.#!"
 vtm_je_first_carlist_war_organize_incursion:0 "@incursion_icon! Organize Incursion"
 vtm_je_first_carlist_war_organize_incursion_desc:0 "The uniquely decentralized nature of the Carlist forces comes with some advantages too, individual detachments can be ordered to wreak havoc in enemy territory and secure supplies on their way home.\n$TOOLTIP_DELIMITER$\n@vtm_toggle_icon! This action can be toggled and will automatically repeat as long as its conditions are met and its #I (Selected)#!."

